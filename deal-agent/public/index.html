<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Wizard Wash — Deal Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0a0810;--surface:#110e1a;--card:#16121f;--border:#2a2040;
      --purple:#7c3aed;--purple2:#9d5cf6;--green:#39ff14;--green2:#22c700;
      --text:#f0ecff;--muted:#6b5f8a;--error:#ff4466;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 120% 60% at 50% 0%,rgba(124,58,237,0.18) 0%,transparent 60%),radial-gradient(ellipse 80% 40% at 80% 100%,rgba(57,255,20,0.06) 0%,transparent 50%);pointer-events:none;z-index:0;}
    .sparkles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .sparkle{position:absolute;width:2px;height:2px;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite var(--delay);opacity:0;}
    @keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1.5)}}
    #app{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
    header{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:14px 18px 12px;border-bottom:1px solid var(--border);background:rgba(10,8,16,.9);backdrop-filter:blur(12px);}
    .logo-wrap{position:relative;width:48px;height:48px;flex-shrink:0;}
    .logo-wrap img{width:48px;height:48px;border-radius:10px;object-fit:cover;}
    .logo-fallback{display:none;width:48px;height:48px;background:linear-gradient(135deg,#7c3aed,#39ff14);border-radius:10px;align-items:center;justify-content:center;font-size:24px;}
    .logo-glow{position:absolute;inset:-4px;border-radius:14px;box-shadow:0 0 16px rgba(124,58,237,.7),0 0 32px rgba(57,255,20,.2);animation:logoPulse 3s ease-in-out infinite;}
    @keyframes logoPulse{0%,100%{box-shadow:0 0 16px rgba(124,58,237,.7),0 0 32px rgba(57,255,20,.2)}50%{box-shadow:0 0 28px rgba(124,58,237,1),0 0 50px rgba(57,255,20,.4)}}
    .header-text{flex:1;min-width:0;}
    .header-title{font-family:'Cinzel',serif;font-size:16px;font-weight:900;letter-spacing:.05em;line-height:1;background:linear-gradient(135deg,#fff 0%,var(--purple2) 50%,var(--green) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .header-sub{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
    .status-pill{display:flex;align-items:center;gap:5px;background:rgba(57,255,20,.08);border:1px solid rgba(57,255,20,.2);border-radius:100px;padding:5px 10px;font-size:10px;color:var(--green);letter-spacing:.05em;flex-shrink:0;}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .stats-bar{flex-shrink:0;display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
    .stat{flex:1;background:var(--surface);padding:10px 8px;text-align:center;}
    .stat-num{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--purple2);line-height:1;}
    .stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}
    .messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;}
    .messages::-webkit-scrollbar{width:3px;}
    .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .msg{display:flex;flex-direction:column;gap:3px;animation:msgIn .25s ease;}
    @keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{align-items:flex-end;}.msg.agent{align-items:flex-start;}
    .msg-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 4px;}
    .msg-bubble{max-width:88%;padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.55;font-weight:500;white-space:pre-wrap;}
    .msg.user .msg-bubble{background:linear-gradient(135deg,#4c1d95,#6d28d9);border:1px solid rgba(167,139,250,.3);border-bottom-right-radius:4px;color:#ede9fe;}
    .msg.agent .msg-bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;}
    .msg.agent .msg-bubble.success{border-color:rgba(57,255,20,.25);background:rgba(57,255,20,.04);}
    .msg.agent .msg-bubble.error{border-color:rgba(255,68,102,.3);background:rgba(255,68,102,.04);}
    .deal-card{margin-top:10px;border-radius:10px;overflow:hidden;border:1px solid rgba(124,58,237,.3);}
    .deal-card-header{background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(57,255,20,.1));padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
    .deal-card-title{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:#fff;}
    .stage-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:100px;}
    .sQ{background:rgba(240,192,64,.15);color:#f0c040;border:1px solid rgba(240,192,64,.3);}
    .sSc{background:rgba(56,189,248,.15);color:#38bdf8;border:1px solid rgba(56,189,248,.3);}
    .sCo{background:rgba(57,255,20,.15);color:#39ff14;border:1px solid rgba(57,255,20,.3);}
    .sPa{background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.3);}
    .deal-card-body{background:rgba(0,0,0,.3);padding:10px 12px;}
    .deal-row{display:flex;justify-content:space-between;align-items:flex-start;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:8px;}
    .deal-row:last-child{border-bottom:none;}
    .deal-key{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;}
    .deal-val{font-size:12px;color:var(--text);font-weight:600;text-align:right;}
    .deal-id{margin-top:8px;font-size:10px;color:var(--muted);text-align:center;letter-spacing:.05em;}
    .typing-dots{display:flex;gap:5px;padding:6px 2px;align-items:center;}
    .typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--purple2);animation:bounce 1.2s ease-in-out infinite;}
    .typing-dots span:nth-child(2){animation-delay:.2s;}.typing-dots span:nth-child(3){animation-delay:.4s;}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-6px);opacity:1}}
    .input-area{flex-shrink:0;padding:12px 14px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:rgba(10,8,16,.95);backdrop-filter:blur(16px);border-top:1px solid var(--border);}
    .input-wrap{display:flex;gap:10px;align-items:flex-end;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:10px 14px;transition:border-color .2s;}
    .input-wrap:focus-within{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.15);}
    textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:500;line-height:1.4;resize:none;min-height:24px;max-height:100px;overflow-y:auto;}
    textarea::placeholder{color:var(--muted);}
    .send-btn{width:38px;height:38px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--purple),var(--green2));color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;box-shadow:0 0 12px rgba(124,58,237,.4);}
    .send-btn:active{transform:scale(.92);}.send-btn:disabled{background:var(--border);box-shadow:none;cursor:not-allowed;}
    .send-btn svg{width:18px;height:18px;}
    .welcome{text-align:center;padding:24px 16px;}
    .welcome-icon{font-size:40px;display:block;margin-bottom:10px;filter:drop-shadow(0 0 12px rgba(124,58,237,.8));}
    .welcome h2{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px;}
    .welcome p{font-size:13px;color:var(--muted);line-height:1.6;}
    .welcome-fields{margin-top:14px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;text-align:left;}
    .welcome-fields p{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
    .field-tags{display:flex;flex-wrap:wrap;gap:6px;}
    .field-tag{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--purple2);font-weight:600;}
  </style>
</head>
<body>
<div class="sparkles" id="sparkles"></div>
<div id="app">
  <header>
    <div class="logo-wrap">
      <img src="logo.png" alt="Wizard Wash" onerror="this.style.display='none';this.parentElement.querySelector('.logo-fallback').style.display='flex'" />
      <div class="logo-glow"></div>
      <div class="logo-fallback">🧙</div>
    </div>
    <div class="header-text">
      <div class="header-title">WIZARD WASH</div>
      <div class="header-sub">Deal Command Center</div>
    </div>
    <div class="status-pill"><div class="status-dot"></div>LIVE</div>
  </header>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="stat-today">0</div><div class="stat-label">Today</div></div>
    <div class="stat"><div class="stat-num" id="stat-session">0</div><div class="stat-label">Session</div></div>
    <div class="stat"><div class="stat-num" id="stat-value">$0</div><div class="stat-label">Value</div></div>
  </div>
  <div class="messages" id="messages">
    <div class="welcome">
      <span class="welcome-icon">🧙‍♂️</span>
      <h2>Ready to Cast Some Deals</h2>
      <p>Type your lead info in plain English and I'll create the deal in Zoho instantly.</p>
      <div class="welcome-fields">
        <p>Fields you can include</p>
        <div class="field-tags">
          <span class="field-tag">Name</span><span class="field-tag">Amount</span><span class="field-tag">Phone</span>
          <span class="field-tag">Email</span><span class="field-tag">Address</span><span class="field-tag">Service</span>
          <span class="field-tag">Job Date</span><span class="field-tag">Stage</span><span class="field-tag">Owner</span><span class="field-tag">Notes</span>
        </div>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="e.g. John Smith, $500, 804-555-1234, 123 Oak St, house wash, Friday 10am, Omar" rows="1" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>
</div>
<script>
  // Sparkles
  const sp = document.getElementById('sparkles');
  for(let i=0;i<40;i++){const s=document.createElement('div');s.className='sparkle';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s;background:${Math.random()>.5?'#39ff14':'#a78bfa'};box-shadow:0 0 4px ${Math.random()>.5?'#39ff14':'#a78bfa'};`;sp.appendChild(s);}

  // Stats
  let sessionDeals=0,sessionValue=0;
  const todayKey='ww_today_'+new Date().toDateString();
  let todayDeals=parseInt(localStorage.getItem(todayKey)||'0');
  updateStats();
  function updateStats(amount){
    if(amount!==undefined){sessionDeals++;sessionValue+=amount||0;todayDeals++;localStorage.setItem(todayKey,todayDeals);}
    document.getElementById('stat-today').textContent=todayDeals;
    document.getElementById('stat-session').textContent=sessionDeals;
    document.getElementById('stat-value').textContent=sessionValue>=1000?'$'+(sessionValue/1000).toFixed(1)+'k':'$'+sessionValue;
  }

  // Textarea resize
  const ta=document.getElementById('input');
  ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,100)+'px';});
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});

  function scrollBottom(){const m=document.getElementById('messages');m.scrollTop=m.scrollHeight;}

  function addMsg(role,content,type=''){
    const m=document.getElementById('messages');
    const d=document.createElement('div');d.className=`msg ${role}`;
    const l=document.createElement('div');l.className='msg-label';l.textContent=role==='user'?'You':'Wizard';
    const b=document.createElement('div');b.className=`msg-bubble ${type}`;b.textContent=content;
    d.appendChild(l);d.appendChild(b);m.appendChild(d);scrollBottom();return b;
  }

  function stageClass(s){return{Quoted:'sQ',Scheduled:'sSc',Completed:'sCo','Past Customer':'sPa'}[s]||'sQ';}

  function addDealCard(bubble,deal,zohoId){
    const card=document.createElement('div');card.className='deal-card';
    const ownerName=deal.Owner?(typeof deal.Owner==='object'?deal.Owner.name:deal.Owner):'';
    let dateStr='';
    if(deal.Job_Date_and_Time){try{dateStr=new Date(deal.Job_Date_and_Time).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}catch(e){dateStr=deal.Job_Date_and_Time;}}
    card.innerHTML=`
      <div class="deal-card-header">
        <div class="deal-card-title">${deal.Deal_Name||'New Deal'}</div>
        <div class="stage-badge ${stageClass(deal.Stage)}">${deal.Stage||'Quoted'}</div>
      </div>
      <div class="deal-card-body">
        ${deal.Amount?`<div class="deal-row"><span class="deal-key">💰 Amount</span><span class="deal-val">$${deal.Amount}</span></div>`:''}
        ${deal.Phone?`<div class="deal-row"><span class="deal-key">📞 Phone</span><span class="deal-val">${deal.Phone}</span></div>`:''}
        ${deal.Email?`<div class="deal-row"><span class="deal-key">✉️ Email</span><span class="deal-val">${deal.Email}</span></div>`:''}
        ${deal.Address?`<div class="deal-row"><span class="deal-key">📍 Address</span><span class="deal-val">${deal.Address}</span></div>`:''}
        ${deal.Service?`<div class="deal-row"><span class="deal-key">🔧 Service</span><span class="deal-val">${deal.Service}</span></div>`:''}
        ${dateStr?`<div class="deal-row"><span class="deal-key">📅 Date</span><span class="deal-val">${dateStr}</span></div>`:''}
        ${ownerName?`<div class="deal-row"><span class="deal-key">👤 Owner</span><span class="deal-val">${ownerName}</span></div>`:''}
        <div class="deal-id">ZOHO ID: ${zohoId}</div>
      </div>`;
    bubble.appendChild(card);scrollBottom();
  }

  function addTyping(){
    const m=document.getElementById('messages');
    const d=document.createElement('div');d.className='msg agent';d.id='typing';
    d.innerHTML='<div class="msg-label">Wizard</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
    m.appendChild(d);scrollBottom();
  }

  async function sendMessage(){
    const btn=document.getElementById('sendBtn');
    const message=ta.value.trim();
    if(!message)return;
    addMsg('user',message);
    ta.value='';ta.style.height='auto';
    btn.disabled=true;addTyping();
    try{
      const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message})});
      const data=await res.json();
      document.getElementById('typing')?.remove();
      if(data.success){
        const bubble=addMsg('agent','✨ Deal conjured successfully!','success');
        addDealCard(bubble,data.deal,data.zohoId);
        updateStats(data.deal.Amount||0);
      }else{
        addMsg('agent',`❌ ${data.error}`,'error');
      }
    }catch(err){
      document.getElementById('typing')?.remove();
      addMsg('agent',`❌ Network error: ${err.message}`,'error');
    }
    btn.disabled=false;ta.focus();
  }
</script>
</body>
</html>
